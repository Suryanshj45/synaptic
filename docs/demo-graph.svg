<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="418" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Window controls -->
  <circle cx="24" cy="20" r="6" fill="#f85149" opacity="0.8"/>
  <circle cx="44" cy="20" r="6" fill="#d29922" opacity="0.8"/>
  <circle cx="64" cy="20" r="6" fill="#3fb950" opacity="0.8"/>
  <text x="400" y="23" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="12">Synaptic — Knowledge Graph</text>

  <!-- Divider -->
  <line x1="0" y1="38" x2="800" y2="38" stroke="#30363d" stroke-width="1"/>

  <!-- Sidebar -->
  <rect x="0" y="38" width="160" height="382" fill="#0d1117" rx="0"/>
  <line x1="160" y1="38" x2="160" y2="420" stroke="#30363d" stroke-width="1"/>

  <!-- Sidebar title -->
  <text x="20" y="65" fill="#c9d1d9" font-family="system-ui" font-size="11" font-weight="600">TOPICS</text>

  <!-- Sidebar clusters -->
  <circle cx="26" cy="86" r="5" fill="#58a6ff"/>
  <text x="38" y="90" fill="#8b949e" font-family="system-ui" font-size="11">Frontend (14)</text>

  <circle cx="26" cy="108" r="5" fill="#3fb950"/>
  <text x="38" y="112" fill="#8b949e" font-family="system-ui" font-size="11">Backend (11)</text>

  <circle cx="26" cy="130" r="5" fill="#d2a8ff"/>
  <text x="38" y="134" fill="#8b949e" font-family="system-ui" font-size="11">DevOps (9)</text>

  <circle cx="26" cy="152" r="5" fill="#f0883e"/>
  <text x="38" y="156" fill="#8b949e" font-family="system-ui" font-size="11">ML / AI (7)</text>

  <circle cx="26" cy="174" r="5" fill="#f778ba"/>
  <text x="38" y="178" fill="#8b949e" font-family="system-ui" font-size="11">Data (5)</text>

  <!-- Sidebar stats -->
  <text x="20" y="210" fill="#c9d1d9" font-family="system-ui" font-size="11" font-weight="600">STATS</text>
  <text x="20" y="232" fill="#8b949e" font-family="system-ui" font-size="10">Conversations</text>
  <text x="140" y="232" fill="#c9d1d9" font-family="system-ui" font-size="10" text-anchor="end">247</text>
  <text x="20" y="250" fill="#8b949e" font-family="system-ui" font-size="10">Entities</text>
  <text x="140" y="250" fill="#58a6ff" font-family="system-ui" font-size="10" text-anchor="end">120</text>
  <text x="20" y="268" fill="#8b949e" font-family="system-ui" font-size="10">Relationships</text>
  <text x="140" y="268" fill="#d2a8ff" font-family="system-ui" font-size="10" text-anchor="end">298</text>
  <text x="20" y="286" fill="#8b949e" font-family="system-ui" font-size="10">Sources</text>
  <text x="140" y="286" fill="#8b949e" font-family="system-ui" font-size="10" text-anchor="end">ChatGPT</text>

  <!-- Tab bar -->
  <rect x="160" y="38" width="640" height="30" fill="#161b22"/>
  <text x="220" y="57" fill="#58a6ff" font-family="system-ui" font-size="11" font-weight="600">Graph</text>
  <line x1="200" y1="66" x2="244" y2="66" stroke="#58a6ff" stroke-width="2"/>
  <text x="300" y="57" fill="#8b949e" font-family="system-ui" font-size="11">Timeline</text>
  <text x="390" y="57" fill="#8b949e" font-family="system-ui" font-size="11">Analytics</text>

  <!-- Graph area links (draw first, behind nodes) -->
  <g opacity="0.25" stroke-width="1.5">
    <!-- React cluster -->
    <line x1="380" y1="200" x2="310" y2="155" stroke="#58a6ff"/>
    <line x1="380" y1="200" x2="450" y2="155" stroke="#58a6ff"/>
    <line x1="380" y1="200" x2="340" y2="270" stroke="#58a6ff"/>
    <line x1="380" y1="200" x2="430" y2="260" stroke="#58a6ff"/>
    <line x1="310" y1="155" x2="250" y2="120" stroke="#58a6ff"/>
    <line x1="450" y1="155" x2="510" y2="120" stroke="#58a6ff"/>
    <line x1="340" y1="270" x2="280" y2="310" stroke="#58a6ff"/>

    <!-- Python cluster -->
    <line x1="560" y1="230" x2="620" y2="180" stroke="#3fb950"/>
    <line x1="560" y1="230" x2="630" y2="270" stroke="#3fb950"/>
    <line x1="560" y1="230" x2="510" y2="300" stroke="#3fb950"/>
    <line x1="620" y1="180" x2="680" y2="140" stroke="#3fb950"/>
    <line x1="630" y1="270" x2="690" y2="300" stroke="#3fb950"/>

    <!-- DevOps cluster -->
    <line x1="300" y1="340" x2="360" y2="370" stroke="#d2a8ff"/>
    <line x1="300" y1="340" x2="240" y2="370" stroke="#d2a8ff"/>
    <line x1="360" y1="370" x2="430" y2="380" stroke="#d2a8ff"/>

    <!-- Cross-cluster links -->
    <line x1="380" y1="200" x2="560" y2="230" stroke="#444c56" stroke-dasharray="4,3"/>
    <line x1="340" y1="270" x2="300" y2="340" stroke="#444c56" stroke-dasharray="4,3"/>
    <line x1="510" y1="300" x2="430" y2="380" stroke="#444c56" stroke-dasharray="4,3"/>
    <line x1="430" y1="260" x2="560" y2="230" stroke="#444c56" stroke-dasharray="4,3"/>
  </g>

  <!-- Graph nodes -->
  <g filter="url(#glow)">
    <!-- React (big hub) -->
    <circle cx="380" cy="200" r="22" fill="#58a6ff" opacity="0.9"/>
    <text x="380" y="204" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10" font-weight="600">React</text>

    <!-- Python (big hub) -->
    <circle cx="560" cy="230" r="20" fill="#3fb950" opacity="0.9"/>
    <text x="560" y="234" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10" font-weight="600">Python</text>

    <!-- TypeScript -->
    <circle cx="310" cy="155" r="14" fill="#58a6ff" opacity="0.8"/>
    <text x="310" y="159" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="8" font-weight="500">TS</text>

    <!-- Next.js -->
    <circle cx="450" cy="155" r="13" fill="#58a6ff" opacity="0.8"/>
    <text x="450" y="159" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7" font-weight="500">Next.js</text>

    <!-- D3.js -->
    <circle cx="250" cy="120" r="9" fill="#58a6ff" opacity="0.7"/>
    <text x="250" y="123" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7">D3</text>

    <!-- Vercel -->
    <circle cx="510" cy="120" r="8" fill="#58a6ff" opacity="0.7"/>
    <text x="510" y="123" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="6">Vercel</text>

    <!-- Tailwind -->
    <circle cx="340" cy="270" r="11" fill="#58a6ff" opacity="0.75"/>
    <text x="340" y="273" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7">Tailwind</text>

    <!-- GraphQL -->
    <circle cx="430" cy="260" r="10" fill="#58a6ff" opacity="0.7"/>
    <text x="430" y="263" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7">GraphQL</text>

    <!-- Redux -->
    <circle cx="280" cy="310" r="8" fill="#58a6ff" opacity="0.65"/>
    <text x="280" y="313" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="6">Redux</text>

    <!-- FastAPI -->
    <circle cx="620" cy="180" r="12" fill="#3fb950" opacity="0.8"/>
    <text x="620" y="183" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7" font-weight="500">FastAPI</text>

    <!-- PyTorch -->
    <circle cx="630" cy="270" r="11" fill="#f0883e" opacity="0.8"/>
    <text x="630" y="273" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7">PyTorch</text>

    <!-- PostgreSQL -->
    <circle cx="510" cy="300" r="10" fill="#3fb950" opacity="0.7"/>
    <text x="510" y="303" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="6">Postgres</text>

    <!-- TensorFlow -->
    <circle cx="680" cy="140" r="9" fill="#f0883e" opacity="0.7"/>
    <text x="680" y="143" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="6">TF</text>

    <!-- Pandas -->
    <circle cx="690" cy="300" r="8" fill="#f778ba" opacity="0.7"/>
    <text x="690" y="303" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="6">pandas</text>

    <!-- Docker -->
    <circle cx="300" cy="340" r="15" fill="#d2a8ff" opacity="0.85"/>
    <text x="300" y="344" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="8" font-weight="500">Docker</text>

    <!-- Kubernetes -->
    <circle cx="360" cy="370" r="12" fill="#d2a8ff" opacity="0.8"/>
    <text x="360" y="374" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7">K8s</text>

    <!-- AWS -->
    <circle cx="240" cy="370" r="10" fill="#d2a8ff" opacity="0.7"/>
    <text x="240" y="373" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="7">AWS</text>

    <!-- CI/CD -->
    <circle cx="430" cy="380" r="9" fill="#d2a8ff" opacity="0.7"/>
    <text x="430" y="383" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="6">CI/CD</text>
  </g>

  <!-- Hover tooltip -->
  <g transform="translate(590, 345)">
    <rect x="0" y="0" width="170" height="62" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="12" y="18" fill="#c9d1d9" font-family="system-ui" font-size="10" font-weight="600">React</text>
    <text x="12" y="32" fill="#8b949e" font-family="system-ui" font-size="9">Mentioned in 47 conversations</text>
    <text x="12" y="45" fill="#8b949e" font-family="system-ui" font-size="9">Connected to 14 other topics</text>
    <text x="12" y="57" fill="#58a6ff" font-family="system-ui" font-size="9">Cluster: Frontend</text>
  </g>
</svg>
